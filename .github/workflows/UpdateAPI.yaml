---
name: Update API
on:
  pull_request:
    paths:
      - ".github/workflows/UpdateAPI.yaml"
  schedule:
    - cron: "0 6 * * *"  # Daily at 6 a.m. UTC
  workflow_dispatch:

jobs:
  update:
    name: AWS API Definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"
      - uses: julia-actions/cache@v2
      - name: Instantiate
        shell: julia --project=codegen --threads=auto --color=yes {0}
        run: |
          using Pkg
          Pkg.instantiate()
      # Run against the latest version, since everything merged into master will be tagged.
      - name: Update API
        shell: julia --project=codegen --threads=auto --color=yes {0}
        run: |
          using Codegen: retrieve_service_files, generate_api
          service_files = retrieve_service_files()
          generate_api(service_files)
        env:
          # The built-in GITHUB_TOKEN has a rate limit of 1,000 request per hour. If the
          # number of AWS service definitions approaches that number we may need to utilize
          # another authentication method
          # - https://docs.github.com/en/rest/using-the-rest-api/rate-limits-for-the-rest-api?apiVersion=2022-11-28#primary-rate-limit-for-github_token-in-github-actions
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        if: ${{ github.event_name != 'pull_request' }}
        with:
          commit-message: AWS API Definitions Updated
          reviewers: mattBrzezinski
          title: AWS API Definitions Updated
          token: ${{ secrets.GITHUB_TOKEN }}
